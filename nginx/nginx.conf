daemon off;
pid temp/nginx.pid;
events {}

http {
    include mime.types;
    types_hash_max_size 4096;

    client_body_temp_path temp/client_body;
    fastcgi_temp_path temp/fastcgi;
    uwsgi_temp_path temp/uwsgi;
    scgi_temp_path temp/scgi;
    access_log temp/access;

    server {
        listen       8080;
        server_name  localhost;
        root ../public;

        location / {
            try_files $uri @leptos;
            add_header Cache-Control 'no-store, no-cache';
        }
        
        location @leptos {
            proxy_pass http://127.0.0.1:3000;
        }

        resolver 1.1.1.1 valid=30s;
        proxy_set_header Host ynoproject.net;
        proxy_ssl_server_name on;

        location ~ ^(.*?)/_yno(?=/)(.*)$ {
            proxy_pass https://ynoproject.net$1$2;
        }

        location /data/ {
            proxy_pass https://ynoproject.net/data/;
        }

        location /explorer/ {
            proxy_set_header Host explorer.yume.wiki;
            proxy_pass https://explorer.yume.wiki/;
        }
    }
}
